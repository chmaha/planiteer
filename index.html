<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planiteer - To-do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="todo-styles.css">
</head>

<body>
    <div class="main-content">
        <div id="confetti-container"></div>
        <img id="logo" src="images/planiteer.webp" alt="Planiteer Logo">
        <div>
            <label class="strict-mode">
                <input type="checkbox" id="strictModeCheckbox"> Strict Mode
            </label>
        </div>
        <div class="input-container">
            <input type="text" id="itemInput" placeholder="Enter a to-do item">
            <div id="buttonContainer">
                <button id="addItemBtn">Add</button>
                <button id="pasteBtn">Paste from Clipboard</button>
            </div>
        </div>

        <ul id="todoList"></ul>

        <button id="goBtn">Go</button>

        <div id="controls">
            <button id="prevBtn">Previous</button>
            <button id="doneBtn">Complete Task</button>
            <button id="nextBtn">Next</button>
        </div>

        <p id="completionMessage">To-do list is complete!</p>
        <div id="completedTasksContainer"></div>
        <button id="clearCompletedBtn">Clear Completed Items</button>
    </div>

    <!-- Include Sortable.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
    <!-- Include todo-app.js -->
    <script src="todo-app.js"></script>
</body>

</html>
